services:
  proxy:
    build: ./proxy
    ports:
      - "3000:3000"
    environment:
      - MAIN_APP_URL=http://main-app:3001
      - SHADOW_APP_URL=http://shadow-app:3002
    depends_on:
      - main-app
      - shadow-app

  main-app:
    build: ./main-app

  shadow-app:
    build: ./shadow-app
    environment:
      - BUG_MODE=true
      - BUG_TYPE=missing_field

  dashboard:
    build: ./dashboard
    ports:
      - "5173:80"
    depends_on:
      - proxy